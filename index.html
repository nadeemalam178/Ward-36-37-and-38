<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electoral Data Intelligence Dashboard | AC 182-Bankipur</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              indigo: '#6366f1',
              cyan: '#06b6d4',
              emerald: '#10b981',
              dark: '#0b0f19',
              card: '#111827'
            }
          }
        }
      }
    }
  </script>

  <!-- Custom Glassmorphic Styling -->
  <link rel="stylesheet" href="styles.css" />

  <!-- React 18, Babel, Chart.js, PapaParse, SheetJS -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-[#0b0f19] text-gray-100 min-h-screen">
  <div id="root">
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center space-y-4 max-w-md mx-auto px-6">
        <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-lg font-medium text-indigo-400">Loading Electoral Intelligence System...</p>
        <div id="loading-status" class="text-sm text-gray-400 font-mono bg-gray-900/80 px-4 py-2.5 rounded-xl border border-white/10 shadow-lg">
          ⚡ Initializing high-speed dataset engine...
        </div>
      </div>
    </div>
  </div>

  <script type="text/babel" src="app.js"></script>
</body>
</html>
