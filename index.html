<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electoral Roll & Voter Analytics Dashboard | AC 182-Bankipur</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              indigo: '#2563eb',
              cyan: '#0891b2',
              emerald: '#059669',
              dark: '#f8fafc',
              card: '#ffffff'
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'bounce-slow': 'bounce 2s infinite'
          }
        }
      }
    }
  </script>

  <!-- Custom Styling -->
  <link rel="stylesheet" href="styles.css" />
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React 18, Babel, Chart.js, PapaParse, SheetJS -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-[#f8fafc] dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">
  <div id="root">
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center space-y-4 max-w-md mx-auto px-6">
        <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-lg font-bold text-slate-800">Loading Electoral Roll System...</p>
        <div id="loading-status" class="text-sm text-slate-600 font-mono bg-white px-4 py-2.5 rounded-xl border border-slate-200 shadow-sm">
          Loading active dataset and directory...
        </div>
      </div>
    </div>
  </div>

  <script type="text/babel" src="app.js"></script>
</body>
</html>
